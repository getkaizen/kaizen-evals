name: benchmarks

# Runs the agent-security benchmark harness as a regression gate (a fast subset on changes
# to the detector/skills, the full set nightly) and refreshes the published results.
on:
  pull_request:
    paths:
      - "packaging/sandbox/**"
      - "observer/**"
      - "evals/**"
  schedule:
    - cron: "0 6 * * *"   # nightly full run
  workflow_dispatch:

jobs:
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install boto3
      - name: Run benchmarks (fast subset on PR, full on schedule)
        env:
          OPENAI_API_KEY: ${{ secrets.EVALS_OPENAI_API_KEY }}
          KZ_MODEL_BACKEND: openai
          KZ_MODEL: gpt-4o
          # PRs run a small sample to stay fast/cheap; nightly runs the full set.
          SAMPLE: ${{ github.event_name == 'pull_request' && '40' || '251' }}
          LIMIT: ${{ github.event_name == 'pull_request' && '60' || '0' }}
          WORKERS: "4"
        working-directory: evals
        run: |
          python run_egress_bench.py
          python run_injecagent.py
          python run_agentdojo.py
          KZ_EVAL_SKILLS="$PWD/skills_content" python run_cyberseceval.py
          python run_memory_integrity.py
          python aggregate.py
      - name: Regression gate
        working-directory: evals
        run: python regression_check.py
      - name: Refresh published artifacts (nightly)
        if: github.event_name == 'schedule'
        working-directory: evals
        env:
          RUN_DATE: ${{ github.run_id }}
        run: python publish.py
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: evals/results/results.json
